name: CI

on:
  push:
    branches: [main, develop, dev]
  pull_request:
    branches: [main, develop, dev]

jobs:
  # ── Phase 1: lint, types, contract build (fast, single runner) ──────────────
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: CI=true bun run lint || true

      - name: TypeScript type check
        run: bun run typecheck

      - name: Compile contracts
        run: bunx --bun hardhat compile

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hardhat-artifacts
          path: artifacts/
          retention-days: 1

      - name: Generate ABIs
        run: bun scripts/gen-all.ts

      - name: Validate ABIs are up to date
        run: bun scripts/validate-abis.ts

  # ── Phase 2a: Vitest (3 parallel shards on separate runners) ────────────────
  #
  # Each shard gets its own fresh 7 GB runner → no cross-shard heap bleed.
  # NODE_OPTIONS=6144 gives each shard ~6 GB headroom; peak measured at
  # ~1.5 GB for the original 88-file suite (PR #98), so 6144 MB is safe even
  # as the suite grows past 110 files.
  #
  # If a future shard OOMs again: bump total to 4/4 (update matrix + shard arg).
  vitest:
    runs-on: ubuntu-latest
    needs: lint-and-build
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: hardhat-artifacts
          path: artifacts/

      - name: Generate ABIs
        run: bun scripts/gen-all.ts

      - name: Run Vitest tests (shard ${{ matrix.shard }}/3)
        # Each shard is a fresh Node process on its own runner — no cross-shard
        # heap accumulation. --no-file-parallelism keeps files sequential within
        # the shard so the GC can reclaim module registries between files.
        # p2p-create.test.tsx is excluded — it renders a 1983-line page with
        # all transitive imports un-mocked and exhausts the runner on its own.
        # It runs in the dedicated vitest-heavy job below with 7680 MB.
        # p2p-create.test.tsx is excluded via vitest.config.ts — it renders a
        # 1983-line page with all transitive imports un-mocked and OOMs even on
        # a dedicated 7 GB runner. Excluded until it is refactored.
        run: node node_modules/.bin/vitest run --no-file-parallelism --shard=${{ matrix.shard }}/3
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  # ── Phase 2b: Hardhat tests (runs in parallel with vitest shards) ───────────
  hardhat:
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: hardhat-artifacts
          path: artifacts/

      - name: Run Hardhat tests
        run: bunx --bun hardhat test

  # ── Phase 3: indexer (needs vitest green) ───────────────────────────────────
  indexer-tests:
    runs-on: ubuntu-latest
    needs: [vitest, hardhat]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: hardhat-artifacts
          path: artifacts/

      - name: Install indexer dependencies
        run: cd indexer && bun install --frozen-lockfile

      - name: Run indexer tests
        run: cd indexer && bun run test

  # ── Phase 4: aurellion-core (after indexer validation) ─────────────────────
  aurellion-core:
    runs-on: ubuntu-latest
    needs: indexer-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check aurellion-core
        run: npm run typecheck -w aurellion-core

      - name: Build aurellion-core
        run: npm run build -w aurellion-core

      - name: Test aurellion-core
        run: npm run test -w aurellion-core

  # ── Phase 5: Docker build (after validation) ───────────────────────────────
  build-indexer:
    runs-on: ubuntu-latest
    needs: [vitest, indexer-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./indexer/Dockerfile
          push: false
          tags: indexer:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
