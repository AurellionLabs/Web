name: Sync Supported Assets

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to sync against'
        required: true
        default: 'baseSepolia'
        type: choice
        options:
          - baseSepolia
          - base
          - sepolia
          - arbitrumOne
          - hyperliquid
      write:
        description: 'Write missing classes and metadata instead of dry-run'
        required: true
        default: false
        type: boolean
      diamond_address:
        description: 'Optional Diamond address override'
        required: false
        default: ''
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile contracts
        run: bunx --bun hardhat compile

      - name: Generate ABIs & selectors
        run: bun scripts/gen-all.ts

      - name: Sync supported asset catalog
        env:
          BASE_TEST_RPC_URL: https://base-sepolia.infura.io/v3/30d0943a6329474e8b08a1ce7ab66892
          SEP_PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
          PROD_PRIVATE_KEY: ${{ secrets.PROD_PRIVATE_KEY }}
          ARB_RPC_URL: ${{ secrets.ARB_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          HYPE_RPC_URL: ${{ secrets.HYPE_RPC_URL }}
          SEP_RPC_URL: ${{ secrets.SEP_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          DIAMOND_ADDRESS: ${{ github.event.inputs.diamond_address }}
        run: |
          set -euo pipefail

          NETWORK=${{ github.event.inputs.network }}
          ARGS=()

          if [ "${{ github.event.inputs.write }}" = "true" ]; then
            ARGS+=("--write")
          fi

          if [ -n "${DIAMOND_ADDRESS}" ]; then
            ARGS+=("--diamond" "${DIAMOND_ADDRESS}")
          fi

          bunx --bun hardhat run scripts/sync-supported-assets.ts --network "$NETWORK" -- "${ARGS[@]}"
