name: Deploy Indexer

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'indexer/**'
      - 'scripts/generate-indexer.ts'
      - 'chain-constants.ts'
      - 'types/global.d.ts'
      - 'package.json'
      - 'pnpm-*.yaml'
      - '.github/workflows/deploy-indexer.yml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'dev'
        type: choice
        options:
          - main
          - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/indexer

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete GitHub Actions cache
        run: |
          echo "Deleting GitHub Actions cache..."
          gh cache delete --all || true

      - name: Reset Docker Buildx
        run: |
          docker buildx rm default || true
          docker buildx create --name default --driver docker-container --use || true
          docker buildx inspect --bootstrap || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./indexer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CACHE_BUST=${{ github.sha }}
          cache-from: ''
          cache-to: ''
          no-cache: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          envs: GHCR_TOKEN
          script: |
            cd /srv/Web

            # Reset any local changes (generated files may have changed)
            git reset --hard HEAD
            git clean -fd

            # Pull latest code (for chain-constants.ts and other config)
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            cd /srv/Web/indexer

            # Login to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u github --password-stdin || true

            # Pull latest Docker image from GHCR and restart
            docker compose -f docker-compose.prod.yml pull indexer
            docker compose -f docker-compose.prod.yml up -d

            # Clean up unused images
            docker image prune -f
