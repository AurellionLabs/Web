name: Set Pay Token

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to update'
        required: true
        default: 'arbitrumOne'
        type: choice
        options:
          - baseSepolia
          - base
          - sepolia
          - arbitrumOne
          - hyperliquid
      dry_run:
        description: 'Dry-run without sending transactions'
        required: true
        default: true
        type: boolean
      diamond_address:
        description: 'Optional Diamond address override'
        required: false
        default: ''
        type: string
      token_address:
        description: 'Optional token override (default is chain policy)'
        required: false
        default: ''
        type: string

jobs:
  set-token:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile contracts
        run: bunx --bun hardhat compile

      - name: Generate ABIs & selectors
        run: bun scripts/gen-all.ts

      - name: Set pay token
        env:
          BASE_TEST_RPC_URL: https://lb.drpc.live/base-sepolia/AlCxy0Sf_0uwk16xDiJkYx08AntCBacR8bS5ehXRfUMv
          SEP_PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
          PROD_PRIVATE_KEY: ${{ secrets.PROD_PRIVATE_KEY }}
          ARB_RPC_URL: ${{ secrets.ARB_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          HYPE_RPC_URL: ${{ secrets.HYPE_RPC_URL }}
          SEP_RPC_URL: ${{ secrets.SEP_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
          DIAMOND_ADDRESS: ${{ github.event.inputs.diamond_address }}
          PAY_TOKEN_ADDRESS: ${{ github.event.inputs.token_address }}
        run: |
          set -euo pipefail

          NETWORK=${{ github.event.inputs.network }}
          ARGS=()

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS+=("--dry-run")
          fi

          if [ -n "${DIAMOND_ADDRESS}" ]; then
            ARGS+=("--diamond" "${DIAMOND_ADDRESS}")
          fi

          if [ -n "${PAY_TOKEN_ADDRESS}" ]; then
            ARGS+=("--token" "${PAY_TOKEN_ADDRESS}")
          fi

          HARDHAT_NETWORK="$NETWORK" bun scripts/set-pay-token.ts "${ARGS[@]}"
