name: Deploy Contracts

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy to'
        required: true
        default: 'arbitrumSepolia'
        type: choice
        options:
          - arbitrumSepolia
          - baseSepolia
          - sepolia

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile contracts
        run: bunx --bun hardhat compile

      - name: Generate ABIs
        run: bun scripts/gen-all.ts

      - name: Deploy contracts
        env:
          ARB_SEP_RPC_URL: ${{ secrets.ARB_SEP_RPC_URL }}
          ARB_SEP_PRIVATE_KEY: ${{ secrets.ARB_SEP_PRIVATE_KEY }}
          BASE_TEST_RPC_URL: ${{ secrets.BASE_TEST_RPC_URL }}
          SEP_RPC_URL: ${{ secrets.SEP_RPC_URL }}
          SEP_PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
          ARBISCAN_API_KEY: ${{ secrets.ARBISCAN_API_KEY }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          bunx --bun hardhat run scripts/deploy-all.ts --network ${{ github.event.inputs.network }}

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-${{ github.event.inputs.network }}-${{ github.sha }}
          path: deployments/
