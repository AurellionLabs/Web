name: Deploy Contracts

permissions:
  contents: write
  actions: write

on:
  # Auto-deploy testnet on dev branch only — main deploys are manual (workflow_dispatch)
  push:
    branches: [dev]
    paths:
      - 'contracts/diamond/facets/**'
      - 'scripts/deploy.config.ts'
      - 'scripts/unified-deploy.ts'
      - 'scripts/sync-supported-assets.ts'
      - 'scripts/lib/supported-assets*.ts'
      - 'supported-assets/**'

  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy to'
        required: true
        default: 'baseSepolia'
        type: choice
        options:
          - baseSepolia
          - base
          - sepolia
          - arbitrumOne
          - hyperliquid
      mode:
        description: 'Deploy mode (leave empty for change-detection)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - full
          - diamond
          - diamond-v2
          - rwy
          - bridge
          - all

# ---------------------------------------------------------------------------
# Job 1: detect – compile, generate selectors, detect changed facets
# ---------------------------------------------------------------------------
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.changes.outputs.has_changes }}
      changes_json: ${{ steps.changes.outputs.changes_json }}
      new_facets: ${{ steps.changes.outputs.new_facets }}
      changed_facets: ${{ steps.changes.outputs.changed_facets }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile contracts
        run: bunx --bun hardhat compile

      - name: Generate ABIs & selectors
        run: bun scripts/gen-all.ts

      - name: Build on-chain manifest
        env:
          BASE_TEST_RPC_URL: https://lb.drpc.live/base-sepolia/AlCxy0Sf_0uwk16xDiJkYx08AntCBacR8bS5ehXRfUMv
          SEP_PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
          PROD_PRIVATE_KEY: ${{ secrets.PROD_PRIVATE_KEY }}
          ARB_RPC_URL: ${{ secrets.ARB_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          HYPE_RPC_URL: ${{ secrets.HYPE_RPC_URL }}
          SEP_RPC_URL: ${{ secrets.SEP_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
        run: bunx --bun hardhat run scripts/build-manifest.ts --network ${{ github.event.inputs.network || 'baseSepolia' }}

      - name: Detect facet changes
        id: changes
        env:
          BASE_TEST_RPC_URL: https://lb.drpc.live/base-sepolia/AlCxy0Sf_0uwk16xDiJkYx08AntCBacR8bS5ehXRfUMv
          SEP_PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
          PROD_PRIVATE_KEY: ${{ secrets.PROD_PRIVATE_KEY }}
          ARB_RPC_URL: ${{ secrets.ARB_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          HYPE_RPC_URL: ${{ secrets.HYPE_RPC_URL }}
          SEP_RPC_URL: ${{ secrets.SEP_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
        run: |
          CHANGES=$(bunx --bun hardhat run scripts/detect-facet-changes.ts --network ${{ github.event.inputs.network || 'baseSepolia' }})
          echo "changes_json=$CHANGES" >> "$GITHUB_OUTPUT"

          NEW=$(echo "$CHANGES" | jq -r '.new | join(",")')
          CHANGED=$(echo "$CHANGES" | jq -r '.changed | join(",")')
          echo "new_facets=$NEW" >> "$GITHUB_OUTPUT"
          echo "changed_facets=$CHANGED" >> "$GITHUB_OUTPUT"

          NEW_COUNT=$(echo "$CHANGES" | jq '.new | length')
          CHANGED_COUNT=$(echo "$CHANGES" | jq '.changed | length')
          TOTAL=$((NEW_COUNT + CHANGED_COUNT))

          if [ "$TOTAL" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "::notice ::Facets to deploy — new($NEW_COUNT): [$NEW]  changed($CHANGED_COUNT): [$CHANGED]"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice ::No facet changes detected"
          fi

      - name: Upload change artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facet-changes-${{ github.sha }}
          path: |
            deployments/manifest.json
            deployments/pending-changes.json

# ---------------------------------------------------------------------------
# Job 2: deploy – deploy changed / new facets to the Diamond
# ---------------------------------------------------------------------------
  deploy:
    needs: detect
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest

    # Manual approval gate for main branch
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile contracts
        run: bunx --bun hardhat compile

      - name: Generate ABIs & selectors
        run: bun scripts/gen-all.ts

      # ------------------------------------------------------------------
      # Full redeploy via workflow_dispatch mode
      # ------------------------------------------------------------------
      - name: Deploy mode (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode != ''
        env:
          BASE_TEST_RPC_URL: https://lb.drpc.live/base-sepolia/AlCxy0Sf_0uwk16xDiJkYx08AntCBacR8bS5ehXRfUMv
          SEP_RPC_URL: ${{ secrets.SEP_RPC_URL }}
          SEP_PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
          PROD_PRIVATE_KEY: ${{ secrets.PROD_PRIVATE_KEY }}
          ARB_RPC_URL: ${{ secrets.ARB_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          HYPE_RPC_URL: ${{ secrets.HYPE_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          DEPLOY_MODE: ${{ github.event.inputs.mode }}
        run: |
          NETWORK=${{ github.event.inputs.network || 'baseSepolia' }}
          echo "::group::Deploy mode=$DEPLOY_MODE to $NETWORK"
          bunx --bun hardhat run scripts/unified-deploy.ts --network "$NETWORK"
          echo "::endgroup::"

      # ------------------------------------------------------------------
      # Incremental deploy: each new / changed facet
      # ------------------------------------------------------------------
      - name: Deploy changed facets
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.mode == ''
        env:
          BASE_TEST_RPC_URL: https://lb.drpc.live/base-sepolia/AlCxy0Sf_0uwk16xDiJkYx08AntCBacR8bS5ehXRfUMv
          SEP_PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
          PROD_PRIVATE_KEY: ${{ secrets.PROD_PRIVATE_KEY }}
          ARB_RPC_URL: ${{ secrets.ARB_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          HYPE_RPC_URL: ${{ secrets.HYPE_RPC_URL }}
          SEP_RPC_URL: ${{ secrets.SEP_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
        run: |
          FACETS="${{ needs.detect.outputs.new_facets }},${{ needs.detect.outputs.changed_facets }}"
          # Remove leading/trailing commas and deduplicate
          FACETS=$(echo "$FACETS" | tr ',' '\n' | sed '/^$/d' | sort -u | tr '\n' ',')
          FACETS=${FACETS%,}

          if [ -z "$FACETS" ]; then
            echo "No facets to deploy"
            exit 0
          fi

          echo "Deploying facets: $FACETS"

          IFS=',' read -ra FACET_ARRAY <<< "$FACETS"
          for facet in "${FACET_ARRAY[@]}"; do
            echo "::group::Deploy $facet"
            DEPLOY_FACET="$facet" DEPLOY_ACTION=auto \
              bunx --bun hardhat run scripts/unified-deploy.ts --network ${{ github.event.inputs.network || 'baseSepolia' }}
            echo "::endgroup::"
          done

      # ------------------------------------------------------------------
      # Refresh manifest after deployment
      # ------------------------------------------------------------------
      - name: Rebuild manifest
        env:
          BASE_TEST_RPC_URL: https://lb.drpc.live/base-sepolia/AlCxy0Sf_0uwk16xDiJkYx08AntCBacR8bS5ehXRfUMv
          SEP_PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
          PROD_PRIVATE_KEY: ${{ secrets.PROD_PRIVATE_KEY }}
          ARB_RPC_URL: ${{ secrets.ARB_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          HYPE_RPC_URL: ${{ secrets.HYPE_RPC_URL }}
          SEP_RPC_URL: ${{ secrets.SEP_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
        run: bunx --bun hardhat run scripts/build-manifest.ts --network ${{ github.event.inputs.network || 'baseSepolia' }}

      - name: Sync supported asset catalog
        env:
          BASE_TEST_RPC_URL: https://lb.drpc.live/base-sepolia/AlCxy0Sf_0uwk16xDiJkYx08AntCBacR8bS5ehXRfUMv
          SEP_PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
          PROD_PRIVATE_KEY: ${{ secrets.PROD_PRIVATE_KEY }}
          ARB_RPC_URL: ${{ secrets.ARB_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          HYPE_RPC_URL: ${{ secrets.HYPE_RPC_URL }}
          SEP_RPC_URL: ${{ secrets.SEP_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.SEP_PRIVATE_KEY }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          NETWORK=${{ github.event.inputs.network || 'baseSepolia' }}
          HARDHAT_NETWORK="$NETWORK" bun scripts/sync-supported-assets.ts --write

      - name: Detect persisted deployment changes
        id: persist_changes
        env:
          DEPLOY_MODE: ${{ github.event.inputs.mode }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          TRACKED_FILES=(
            deployments/manifest.json
            chain-constants.ts
            indexer/diamond-constants.ts
          )

          : > .deploy-sync-files
          CONFIG_CHANGED=false

          for file in "${TRACKED_FILES[@]}"; do
            if ! git diff --quiet -- "$file"; then
              echo "$file" >> .deploy-sync-files
              echo "Will persist $file"

              if [ "$file" != "deployments/manifest.json" ]; then
                CONFIG_CHANGED=true
              fi
            fi
          done

          if [ ! -s .deploy-sync-files ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "should_refresh_indexer=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SHOULD_REFRESH_INDEXER=false
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$CONFIG_CHANGED" = "true" ]; then
            case "$DEPLOY_MODE" in
              diamond|diamond-v2|all)
                SHOULD_REFRESH_INDEXER=true
                ;;
            esac
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "should_refresh_indexer=$SHOULD_REFRESH_INDEXER" >> "$GITHUB_OUTPUT"

      - name: Persist deployment files
        if: steps.persist_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          FILE_LIST=".deploy-sync-files"
          MAX_RETRIES=5
          RETRY_DELAY=2

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $attempt of $MAX_RETRIES to persist deployment files..."

            BASE_SHA=$(gh api "repos/$REPO/git/ref/heads/$BRANCH" --jq '.object.sha')
            BASE_TREE=$(gh api "repos/$REPO/git/commits/$BASE_SHA" --jq '.tree.sha')

            TREE_ENTRIES='[]'
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              ENTRY=$(jq -n \
                --arg path "$file" \
                --rawfile content "$file" \
                '{path:$path, mode:"100644", type:"blob", content:$content}')
              TREE_ENTRIES=$(jq -c --argjson entry "$ENTRY" '. + [$entry]' <<<"$TREE_ENTRIES")
            done < "$FILE_LIST"

            TREE_PAYLOAD=$(jq -n \
              --arg base_tree "$BASE_TREE" \
              --argjson tree "$TREE_ENTRIES" \
              '{base_tree:$base_tree, tree:$tree}')
            NEW_TREE_SHA=$(gh api "repos/$REPO/git/trees" --method POST --input - --jq '.sha' <<<"$TREE_PAYLOAD")

            COMMIT_PAYLOAD=$(jq -n \
              --arg message "chore: sync deploy artifacts [skip ci]" \
              --arg tree "$NEW_TREE_SHA" \
              --arg parent "$BASE_SHA" \
              '{message:$message, tree:$tree, parents:[$parent]}')
            NEW_COMMIT_SHA=$(gh api "repos/$REPO/git/commits" --method POST --input - --jq '.sha' <<<"$COMMIT_PAYLOAD")

            REF_UPDATE_PAYLOAD=$(jq -n --arg sha "$NEW_COMMIT_SHA" '{sha:$sha, force:false}')

            set +e
            RESPONSE=$(printf '%s' "$REF_UPDATE_PAYLOAD" | \
              gh api "repos/$REPO/git/refs/heads/$BRANCH" --method PATCH --input - 2>&1)
            EXIT_CODE=$?
            set -e

            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Persisted deployment files:"
              cat "$FILE_LIST"
              exit 0
            fi

            if [[ "$RESPONSE" == *"409"* || "$RESPONSE" == *"Reference update failed"* ]]; then
              echo "⚠️  Branch moved while updating files, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            else
              echo "❌ Failed to persist deployment files: $RESPONSE"
              exit 1
            fi
          done

          echo "❌ Failed to persist deployment files after $MAX_RETRIES attempts"
          exit 1

      - name: Trigger indexer redeploy
        if: steps.persist_changes.outputs.should_refresh_indexer == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="${{ github.ref_name }}"
          DISPATCH_PAYLOAD=$(jq -n \
            --arg branch "$BRANCH" \
            '{ref:$branch, inputs:{branch:$branch}}')

          printf '%s' "$DISPATCH_PAYLOAD" | \
            gh api "repos/${{ github.repository }}/actions/workflows/deploy-indexer.yml/dispatches" \
              --method POST \
              --input -

          echo "Triggered deploy-indexer.yml for $BRANCH after Diamond config changes."

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-${{ github.sha }}
          path: deployments/
