specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AuSys
    network: base-sepolia
    source:
      address: "0xF0d9C3a0Be6a6Cb0821f8217e422C37122E09BA6"
      abi: AuSys
      startBlock: 35639317
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AdminSet
        - DriverAssigned
        - FundsEscrowed
        - FundsRefunded
        - JourneyCanceled
        - JourneyCreated
        - JourneyStatusUpdated
        - NodeFeeDistributed
        - OrderCreated
        - OrderSettled
        - OrderStatusUpdated
        - OwnershipTransferred
        - RoleAdminChanged
        - RoleGranted
        - RoleRevoked
        - SellerPaid
        - emitSig
      abis:
        - name: AuSys
          file: ./abis/AuSys.json
      eventHandlers:
        - event: AdminSet(indexed address)
          handler: handleAdminSet
        - event: DriverAssigned(indexed address,indexed bytes32)
          handler: handleDriverAssigned
        - event: FundsEscrowed(indexed address,uint256)
          handler: handleFundsEscrowed
        - event: FundsRefunded(indexed address,uint256)
          handler: handleFundsRefunded
        - event: JourneyCanceled(indexed bytes32,indexed address,uint256)
          handler: handleJourneyCanceled
        - event: JourneyCreated(indexed bytes32,indexed address,indexed address)
          handler: handleJourneyCreated
        - event: JourneyStatusUpdated(indexed bytes32,uint8)
          handler: handleJourneyStatusUpdated
        - event: NodeFeeDistributed(indexed address,uint256)
          handler: handleNodeFeeDistributed
        - event: OrderCreated(indexed bytes32,indexed address,indexed address,address,uint256,uint256,uint256,uint256,uint256,uint8,address[],((string,string),(string,string),string,string))
          handler: handleOrderCreated
        - event: OrderSettled(indexed bytes32)
          handler: handleOrderSettled
        - event: OrderStatusUpdated(indexed bytes32,uint8)
          handler: handleOrderStatusUpdated
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: RoleAdminChanged(indexed bytes32,indexed bytes32,indexed bytes32)
          handler: handleRoleAdminChanged
        - event: RoleGranted(indexed bytes32,indexed address,indexed address)
          handler: handleRoleGranted
        - event: RoleRevoked(indexed bytes32,indexed address,indexed address)
          handler: handleRoleRevoked
        - event: SellerPaid(indexed address,uint256)
          handler: handleSellerPaid
        - event: emitSig(indexed address,indexed bytes32)
          handler: handleemitSig
      file: ./src/au-sys.ts
