specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AurumNodeManager
    network: base-sepolia
    source:
      address: "0x5a1A031f66612906CA81c73153ec572DB4C3814B"
      abi: AurumNodeManager
      startBlock: 35834488
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - NodeCapacityUpdated
        - NodeRegistered
        - OwnershipTransferred
        - SupportedAssetAdded
        - SupportedAssetsUpdated
        - eventUpdateAdmin
        - eventUpdateLocation
        - eventUpdateOwner
        - eventUpdateStatus
      abis:
        - name: AurumNodeManager
          file: ./abis/AurumNodeManager.json
      eventHandlers:
        - event: NodeCapacityUpdated(indexed address,uint256[])
          handler: handleNodeCapacityUpdated
        - event: NodeRegistered(indexed address,indexed address)
          handler: handleNodeRegistered
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: SupportedAssetAdded(indexed address,(address,uint256,uint256,uint256))
          handler: handleSupportedAssetAdded
        - event: SupportedAssetsUpdated(indexed address,(address,uint256,uint256,uint256)[])
          handler: handleSupportedAssetsUpdated
        - event: eventUpdateAdmin(address)
          handler: handleeventUpdateAdmin
        - event: eventUpdateLocation(string,string,string,address)
          handler: handleeventUpdateLocation
        - event: eventUpdateOwner(address,address)
          handler: handleeventUpdateOwner
        - event: eventUpdateStatus(bytes1,address)
          handler: handleeventUpdateStatus
      file: ./src/aurum-node-manager.ts
