specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: AurumNodeManager
    network: base-sepolia
    source:
      address: "0x1c38dD7FB7760294fd9652959a199ee8ca67A9DA"
      abi: AurumNodeManager
      startBlock: 32137022
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Node
        - NodeAsset
        - NodeLocation
        - NodeRegistered
        - NodeOwnershipTransferred
        - NodeStatusUpdated
        - SupportedAssetAdded
        - SupportedAssetsUpdated
        - NodeCapacityUpdated
        - AssetCapacity
      abis:
        - name: AurumNodeManager
          file: AurumNodeManager/AurumNodeManager.json
      eventHandlers:
        - event: NodeRegistered(indexed address,indexed address)
          handler: handleNodeRegistered
        - event: eventUpdateLocation(string,string,string,address)
          handler: handleNodeLocationUpdated
        - event: eventUpdateOwner(address,address)
          handler: handleNodeOwnershipTransferred
        - event: eventUpdateStatus(bytes1,address)
          handler: handleNodeStatusUpdated
        - event: SupportedAssetAdded(indexed address,(address,uint256,uint256,uint256))
          handler: handleSupportedAssetAdded
        - event: SupportedAssetsUpdated(indexed address,(address,uint256,uint256,uint256)[])
          handler: handleSupportedAssetsUpdated
        - event: NodeCapacityUpdated(indexed address,uint256[])
          handler: handleNodeCapacityUpdated
      file: AurumNodeManager/AurumNodeManager.wasm
