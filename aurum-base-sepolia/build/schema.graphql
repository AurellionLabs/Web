type NodeCapacityUpdated @entity(immutable: true) {
  id: Bytes!
  node: Bytes! # address
  quantities: [BigInt!]! # uint256[]
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type NodeRegistered @entity(immutable: true) {
  id: Bytes!
  nodeAddress: Bytes! # address
  owner: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type OwnershipTransferred @entity(immutable: true) {
  id: Bytes!
  previousOwner: Bytes! # address
  newOwner: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type SupportedAssetAdded @entity(immutable: true) {
  id: Bytes!
  node: Bytes! # address
  asset_token: Bytes! # address
  asset_tokenId: BigInt! # uint256
  asset_price: BigInt! # uint256
  asset_capacity: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type SupportedAssetsUpdated @entity(immutable: true) {
  id: Bytes!
  node: Bytes! # address
  supportedAssets: [Bytes!]! # tuple[]
  blockNumber: BigInt!
