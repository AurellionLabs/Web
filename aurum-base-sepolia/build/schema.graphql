type Node @entity(immutable: false) {
  id: Bytes! # node address
  owner: Bytes! # address
  location: NodeLocation!
  validNode: Boolean! # bool
  status: String! # Active/Inactive
  # assets: [NodeAsset!]! # Removed derivedFrom - query NodeAssets by node field instead
  createdAt: BigInt!
  updatedAt: BigInt!
  blockNumber: BigInt!
  transactionHash: Bytes!
}

type NodeLocation @entity(immutable: false) {
  id: ID! # node address
  addressName: String!
  lat: String!
  lng: String!
  node: String! # node address as string
}

type NodeAsset @entity(immutable: false) {
  id: ID! # node-token-tokenId
  node: String! # node address as string
  token: Bytes! # address
  tokenId: BigInt! # uint256
  price: BigInt! # uint256 (wei)
  capacity: BigInt! # uint256
  createdAt: BigInt!
  updatedAt: BigInt!
  blockNumber: BigInt!
  transactionHash: Bytes!
}

type NodeRegistered @entity(immutable: true) {
  id: Bytes!
  nodeAddress: Bytes! # address
  owner: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type NodeOwnershipTransferred @entity(immutable: true) {
  id: Bytes!
  nodeAddress: Bytes! # address
  oldOwner: Bytes! # address
  newOwner: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type NodeStatusUpdated @entity(immutable: true) {
  id: Bytes!
  nodeAddress: Bytes! # address
  status: String! # Active/Inactive
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type SupportedAssetAdded @entity(immutable: true) {
  id: Bytes!
  nodeAddress: Bytes! # address
  token: Bytes! # address
  tokenId: BigInt! # uint256
  price: BigInt! # uint256
  capacity: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type SupportedAssetsUpdated @entity(immutable: true) {
  id: Bytes!
  nodeAddress: Bytes! # address
  assetsCount: BigInt! # number of assets updated
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type NodeCapacityUpdated @entity(immutable: true) {
  id: Bytes!
  nodeAddress: Bytes! # address
  quantities: [BigInt!]! # uint256[] - updated capacities
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

# Aggregated entities for efficient queries
type AssetCapacity @entity(immutable: false) {
  id: ID! # token-tokenId
  token: Bytes!
  tokenId: BigInt!
  totalCapacity: BigInt!
  totalAllocated: BigInt!
  availableCapacity: BigInt!
  # Note: nodes field removed due to complex relationship - query NodeAssets directly
  updatedAt: BigInt!
}
