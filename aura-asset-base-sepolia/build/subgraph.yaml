specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: AuraAsset
    network: base-sepolia
    source:
      address: '0x044960dF23E46c1f63b0aAE8ac15D5420764c33b'
      abi: AuraAsset
      startBlock: 35639323
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ApprovalForAll
        - AssetAttributeAdded
        - MintedAsset
        - OwnershipTransferred
        - TransferBatch
        - TransferSingle
        - URI
      abis:
        - name: AuraAsset
          file: AuraAsset/AuraAsset.json
      eventHandlers:
        - event: ApprovalForAll(indexed address,indexed address,bool)
          handler: handleApprovalForAll
        - event: AssetAttributeAdded(indexed bytes32,indexed uint256,string,string[],string)
          handler: handleAssetAttributeAdded
        - event: MintedAsset(indexed address,indexed bytes32,indexed uint256,string,string,string)
          handler: handleMintedAsset
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: TransferBatch(indexed address,indexed address,indexed address,uint256[],uint256[])
          handler: handleTransferBatch
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleTransferSingle
        - event: URI(string,indexed uint256)
          handler: handleURI
      file: AuraAsset/AuraAsset.wasm
