specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AuraAsset
    network: base-sepolia
    source:
      address: "0x98939d7a34787EE4d737ed54A926c01D31AdF7c2" # Will be updated by deploy script
      abi: AuraAsset
      startBlock: 31735854 # Will be updated by deploy script
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Asset
        - AssetAttribute
        - SupportedAsset
        - SupportedClass
        - MintedAsset
        - Transfer
        - TransferBatch
        - TokenStats
        - UserBalance
      abis:
        - name: AuraAsset
          file: ./abis/AuraAsset.json
      eventHandlers:
        - event: MintedAsset(indexed address,indexed bytes32,indexed uint256,string,string,string)
          handler: handleMintedAsset
        - event: AssetAttributeAdded(indexed bytes32,indexed uint256,string,string[],string)
          handler: handleAssetAttributeAdded
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleTransferSingle
        - event: TransferBatch(indexed address,indexed address,indexed address,uint256[],uint256[])
          handler: handleTransferBatch
      file: ./src/aura-asset.ts










