# =============================================================================
# Full Stack Type-Safe Data Pipeline
# =============================================================================
#
# Staff-engineer level TDD implementation ensuring the frontend receives and
# displays blockchain data correctly. Uses TypeScript as a feature for
# compile-time correctness.
#
# Parallel Groups:
#   Group 1: Schema type definitions (foundation - no dependencies)
#   Group 2: Generator extensions (depends on types being designed)
#   Group 3: Event mappings (depends on generator tables existing)
#   Group 4: GraphQL types & mappers (depends on schema being generated)
#   Group 5: Mapper unit tests (TDD - tests before wiring)
#   Group 6: Frontend query updates (depends on mappers existing)
#   Group 7: Smoke tests (depends on schema & queries aligned)
#   Group 8: E2E tests (depends on full pipeline working)
#   Group 9: Type & contract tests (depends on types being stable)
#   Group 10: Final validation (depends on all tests existing)
#
# Run command:
#   ./ralph/ralph.sh --yaml ralph/tasks.yaml --opencode --parallel --max-parallel 3
#
# =============================================================================

tasks:
  # ===========================================================================
  # GROUP 1: Schema Type Definitions (Foundation)
  # These define the source-of-truth types - no external dependencies
  # ===========================================================================
  - title: 'T-001: Create shared type definitions for indexer aggregate tables'
    description: |
      Create TypeScript types that mirror the Ponder schema exactly.

      Create file: indexer/src/types/schema.ts

      Define interfaces with snake_case to match Ponder columns:
      - PonderAsset: id (bigint), name, asset_class, class_name, hash, account, amount, block_number, block_timestamp, transaction_hash
      - PonderOrder: id (hex), clob_order_id, ausys_order_id, buyer, seller, token, token_id, quantity, price, bounty, status, logistics_status, start_location_lat/lng, end_location_lat/lng, start_name, end_name, nodes, created_at, updated_at, block_number, block_timestamp, transaction_hash
      - PonderJourney: id (hex), unified_order_id, sender, receiver, driver, status, bounty, eta, start_lat, start_lng, end_lat, end_lng, start_name, end_name, order_id, created_at, block_number, block_timestamp, transaction_hash
      - PonderNode: id (hex), owner, address_name, lat, lng, valid_node, status, block_number, block_timestamp, transaction_hash
      - PonderNodeAsset: id, node, token, token_id, price, capacity, block_number, block_timestamp, transaction_hash

      Include JSDoc comments. Export all types.

      Verify: cd indexer && npx tsc --noEmit
    completed: true
    parallel_group: 1
  # ===========================================================================
  # GROUP 2: Generator Extensions
  # Extend scripts/generate-indexer.ts - depends on types being designed
  # ===========================================================================
  - title: 'T-002: Add nodes aggregate table to generator'
    description: |
      Update scripts/generate-indexer.ts generateEntityTables() function.

      Add 'nodes' table with columns:
      - id: t.hex().primaryKey()
      - owner: t.hex().notNull()
      - address_name: t.text().notNull()
      - lat: t.text().notNull()
      - lng: t.text().notNull()
      - valid_node: t.boolean().notNull()
      - status: t.text().notNull()
      - block_number: t.bigint().notNull()
      - block_timestamp: t.bigint().notNull()
      - transaction_hash: t.hex().notNull()

      Indexes: owner, valid_node, status

      Run: npm run generate:indexer
      Verify: grep -q "export const nodes" indexer/generated-schema.ts
      Verify: cd indexer && npx tsc --noEmit
    completed: true
    parallel_group: 2
  - title: 'T-003: Add node_assets aggregate table to generator'
    description: |
      Update scripts/generate-indexer.ts generateEntityTables() function.

      Add 'node_assets' table with columns:
      - id: t.text().primaryKey() (format: {node}-{tokenId})
      - node: t.hex().notNull()
      - token: t.hex().notNull()
      - token_id: t.bigint().notNull()
      - price: t.bigint().notNull()
      - capacity: t.bigint().notNull()
      - block_number: t.bigint().notNull()
      - block_timestamp: t.bigint().notNull()
      - transaction_hash: t.hex().notNull()

      Indexes: node, token, token_id

      Run: npm run generate:indexer
      Verify: grep -q "export const nodeAssets" indexer/generated-schema.ts
    completed: true
    parallel_group: 2
  - title: 'T-004: Extend journeys table with frontend-required fields'
    description: |
      Update scripts/generate-indexer.ts generateEntityTables() journeys table.

      Add columns:
      - sender: t.hex()
      - receiver: t.hex()
      - driver: t.hex()
      - order_id: t.hex()
      - start_name: t.text()
      - end_name: t.text()
      - created_at: t.bigint()

      Add indexes: sender, receiver, driver, order_id

      Run: npm run generate:indexer
      Verify: cd indexer && npx tsc --noEmit
    completed: true
    parallel_group: 2
  - title: 'T-005: Extend orders table with frontend-required fields'
    description: |
      Update scripts/generate-indexer.ts generateEntityTables() orders table.

      Add columns:
      - start_location_lat: t.text()
      - start_location_lng: t.text()
      - end_location_lat: t.text()
      - end_location_lng: t.text()
      - start_name: t.text()
      - end_name: t.text()
      - nodes: t.text() (JSON array)
      - created_at: t.bigint()
      - updated_at: t.bigint()

      Run: npm run generate:indexer
      Verify: cd indexer && npx tsc --noEmit
    completed: true
    parallel_group: 2
  - title: 'T-006: Extend assets table with frontend-required fields'
    description: |
      Update scripts/generate-indexer.ts generateEntityTables() assets table.

      Add columns:
      - account: t.hex()
      - amount: t.bigint()

      Add index: account

      Run: npm run generate:indexer
      Verify: cd indexer && npx tsc --noEmit
    completed: true
    parallel_group: 2
  # ===========================================================================
  # GROUP 3: Event Mappings
  # Update EVENT_TO_AGGREGATE_MAPPING - depends on generator tables
  # ===========================================================================
  - title: 'T-007: Add nodes event mappings to EVENT_TO_AGGREGATE_MAPPING'
    description: |
      Update scripts/generate-indexer.ts EVENT_TO_AGGREGATE_MAPPING.

      Add mappings:
      - Diamond:NodeRegistered -> nodes insert (id=nodeHash, owner, address_name='', lat='', lng='', valid_node=true, status='Active')
      - Diamond:NodeDeactivated -> nodes update (valid_node=false, status='Inactive')
      - Diamond:UpdateLocation -> nodes update (lat, lng, address_name)
      - Diamond:UpdateStatus -> nodes update (status)

      Run: npm run generate:indexer
      Verify handlers include nodes aggregate updates
    completed: true
    parallel_group: 3
  - title: 'T-008: Add node_assets event mappings to EVENT_TO_AGGREGATE_MAPPING'
    description: |
      Update scripts/generate-indexer.ts EVENT_TO_AGGREGATE_MAPPING.

      Add mappings:
      - Diamond:SupportedAssetAdded -> node_assets insert (id={node}-{tokenId}, node, token, token_id, price, capacity)
      - Diamond:TokensDepositedToNode -> node_assets update (increment capacity)
      - Diamond:TokensWithdrawnFromNode -> node_assets update (decrement capacity)

      Run: npm run generate:indexer
    completed: true
    parallel_group: 3
  - title: 'T-009: Update journeys event mappings with extended fields'
    description: |
      Update scripts/generate-indexer.ts EVENT_TO_AGGREGATE_MAPPING.

      Update Diamond:LogisticsOrderCreated mapping to include:
      - sender (from event args if available, else 0x0)
      - receiver (from event args if available, else 0x0)
      - order_id = unified_order_id
      - created_at = block_timestamp

      Run: npm run generate:indexer
      Verify bridge.generated.ts includes extended journey fields
    completed: true
    parallel_group: 3
  # ===========================================================================
  # GROUP 4: GraphQL Types & Mappers
  # Create type-safe mapping layer - depends on schema being generated
  # ===========================================================================
  - title: 'T-010: Create type-safe GraphQL response types'
    description: |
      Create file: infrastructure/shared/indexer-types.ts

      Define types for GraphQL responses (Ponder uses camelCase in GraphQL):
      - AssetGraphQLItem: id, name, assetClass, className, hash, account, amount, blockNumber, blockTimestamp, transactionHash
      - OrderGraphQLItem: id, clobOrderId, ausysOrderId, buyer, seller, token, tokenId, quantity, price, bounty, status, logisticsStatus, startLocationLat, startLocationLng, endLocationLat, endLocationLng, startName, endName, nodes, createdAt, updatedAt
      - JourneyGraphQLItem: id, unifiedOrderId, sender, receiver, driver, status, bounty, eta, startLat, startLng, endLat, endLng, startName, endName, orderId, createdAt
      - NodeGraphQLItem: id, owner, addressName, lat, lng, validNode, status
      - NodeAssetGraphQLItem: id, node, token, tokenId, price, capacity

      Define wrapper types:
      - AssetsGraphQLResponse: { assetss: { items: AssetGraphQLItem[], pageInfo?: PageInfo } }
      - OrdersGraphQLResponse: { orderss: { items: OrderGraphQLItem[], pageInfo?: PageInfo } }
      - (similar for journeys, nodes, nodeAssets)

      Define PageInfo: { hasNextPage: boolean, endCursor: string }

      Verify: npm run typecheck
    completed: true
    parallel_group: 4
  - title: 'T-011: Create type-safe domain mappers'
    description: |
      Create file: infrastructure/shared/mappers.ts

      Import domain types from domain/ and GraphQL types from indexer-types.ts.

      Create pure mapper functions with explicit return types:

      export function mapGraphQLAssetToDomain(raw: AssetGraphQLItem): Asset {
        return {
          tokenId: raw.id.toString(),
          name: raw.name,
          assetClass: raw.assetClass,
          attributes: [], // populated separately
        };
      }

      export function mapGraphQLOrderToDomain(raw: OrderGraphQLItem): Order {
        // Map all fields, convert status string to OrderStatus enum
        // Parse nodes JSON string to array
        // Construct locationData from lat/lng fields
      }

      export function mapGraphQLJourneyToDomain(raw: JourneyGraphQLItem): Journey {
        // Convert numeric status to JourneyStatus enum
        // Construct parcelData from location fields
        // Convert bounty/eta to bigint
      }

      export function mapGraphQLNodeToDomain(raw: NodeGraphQLItem): Node {
        // Construct location object from lat/lng
      }

      All functions must have NO 'any' types.

      Verify: npm run typecheck
    completed: true
    parallel_group: 4
  # ===========================================================================
  # GROUP 5: Mapper Unit Tests (TDD)
  # Write tests BEFORE wiring mappers into repositories
  # ===========================================================================
  - title: 'T-012: Write unit test for asset mapper'
    description: |
      Create file: test/unit/mappers/asset-mapper.test.ts

      Test cases:
      1. Converts GraphQL response to domain Asset type correctly
      2. Handles bigint id conversion (tokenId)
      3. Maps assetClass and className fields
      4. Handles null/undefined optional fields gracefully

      Use vitest. Import actual mapper function.

      Run: npm run test:vitest -- asset-mapper
      All tests must pass.
    completed: false
    parallel_group: 5
  - title: 'T-013: Write unit test for order mapper'
    description: |
      Create file: test/unit/mappers/order-mapper.test.ts

      Test cases:
      1. Converts status text ('OPEN', 'FILLED', 'CANCELLED') to OrderStatus enum
      2. Maps location fields to locationData object
      3. Parses nodes JSON string to string array
      4. Handles missing optional fields (ausysOrderId, bounty, etc.)
      5. Converts price/quantity to correct types

      Run: npm run test:vitest -- order-mapper
      All tests must pass.
    completed: true
    parallel_group: 5
  - title: 'T-014: Write unit test for journey mapper'
    description: |
      Create file: test/unit/mappers/journey-mapper.test.ts

      Test cases:
      1. Converts numeric status (0, 1, 2, 3) to JourneyStatus enum
      2. Constructs parcelData with startLocation/endLocation
      3. Converts bounty/eta strings to bigint
      4. Maps sender, receiver, driver addresses
      5. Maps orderId correctly

      Run: npm run test:vitest -- journey-mapper
      All tests must pass.
    completed: true
    parallel_group: 5
  - title: 'T-015: Write unit test for node mapper'
    description: |
      Create file: test/unit/mappers/node-mapper.test.ts

      Test cases:
      1. Constructs location object with lat/lng
      2. Maps addressName correctly
      3. Converts validNode boolean
      4. Maps status string
      5. Maps owner address

      Run: npm run test:vitest -- node-mapper
      All tests must pass.
    completed: true
    parallel_group: 5
  # ===========================================================================
  # GROUP 6: Frontend Query Updates
  # Update queries and repositories to use mappers - depends on mappers
  # ===========================================================================
  - title: 'T-016: Update graph-queries.ts field names to match Ponder schema'
    description: |
      Update file: infrastructure/shared/graph-queries.ts

      Ponder auto-converts snake_case columns to camelCase in GraphQL.
      Verify all queries use correct camelCase field names matching Ponder output.

      Check and fix if needed:
      - GET_ALL_ASSETS: fields should be id, name, assetClass, className, hash, account
      - GET_ORDERS_BY_BUYER: fields should match OrderGraphQLItem
      - GET_JOURNEYS_BY_SENDER: fields should match JourneyGraphQLItem
      - GET_NODES_BY_OWNER: fields should match NodeGraphQLItem

      Add any missing fields that frontend needs.

      Verify: npm run typecheck
    completed: true
    parallel_group: 6
  - title: 'T-017: Update OrdersRepository to use type-safe mappers'
    description: |
      Update file: infrastructure/repositories/orders-repository.ts

      Import mappers from infrastructure/shared/mappers.ts

      Replace inline mapping with:
      - Use mapGraphQLOrderToDomain for all order queries
      - Use mapGraphQLJourneyToDomain for all journey queries

      Remove any inline .map() conversion logic.
      Ensure return types match interface definitions.

      Verify: npm run typecheck
    completed: true
    parallel_group: 6
  - title: 'T-018: Update NodeRepository to use type-safe mappers'
    description: |
      Update file: infrastructure/repositories/node-repository.ts

      Import mappers from infrastructure/shared/mappers.ts

      Replace inline mapping with:
      - Use mapGraphQLNodeToDomain for all node queries
      - Use mapGraphQLAssetToDomain for asset queries where applicable

      Ensure return types match interface definitions.

      Verify: npm run typecheck
    completed: true
    parallel_group: 6
  # ===========================================================================
  # GROUP 7: Smoke Tests
  # Integration tests against running indexer - depends on schema aligned
  # ===========================================================================
  - title: 'T-019: Write smoke test for nodes GraphQL query'
    description: |
      Create file: indexer/test/smoke/nodes-query.test.ts

      Test implementation:
      1. Query: nodess(limit: 10) against INDEXER_URL (default http://localhost:42069)
      2. Verify response shape: { nodess: { items: [...] } }
      3. If items exist, verify fields: id, owner, addressName, lat, lng, validNode, status
      4. Test handles empty results (no error, just empty items)
      5. Skip test if indexer unreachable (don't fail CI)

      Use fetch or graphql-request.

      Run: cd indexer && npm test -- --grep 'nodes-query'
    completed: true
    parallel_group: 7
  - title: 'T-020: Write smoke test for node_assets GraphQL query'
    description: |
      Create file: indexer/test/smoke/node-assets-query.test.ts

      Test implementation:
      1. Query: nodeAssetss(limit: 10)
      2. Query with filter: nodeAssetss(where: { node: "0x..." })
      3. Verify fields: id, node, token, tokenId, price, capacity
      4. Handle empty results gracefully

      Run: cd indexer && npm test -- --grep 'node-assets-query'
    completed: true
    parallel_group: 7
  - title: 'T-021: Write smoke test for assets GraphQL query'
    description: |
      Create file: indexer/test/smoke/assets-query.test.ts

      Test implementation:
      1. Query: assetss(limit: 10)
      2. Verify response shape: { assetss: { items: [...] } }
      3. If items exist, verify fields: id, name, assetClass, className, hash, account
      4. Handle empty results gracefully

      Run: cd indexer && npm test -- --grep 'assets-query'
    completed: true
    parallel_group: 7
  - title: 'T-022: Write smoke test for orders GraphQL query'
    description: |
      Create file: indexer/test/smoke/orders-query.test.ts

      Test implementation:
      1. Query: orderss(limit: 10)
      2. Query with filter: orderss(where: { buyer: "0x..." })
      3. Verify fields: id, buyer, seller, token, tokenId, price, status
      4. Handle empty results gracefully

      Run: cd indexer && npm test -- --grep 'orders-query'
    completed: false
    parallel_group: 7
  - title: 'T-023: Write smoke test for journeys GraphQL query'
    description: |
      Create file: indexer/test/smoke/journeys-query.test.ts

      Test implementation:
      1. Query: journeyss(limit: 10)
      2. Query with filter: journeyss(where: { sender: "0x..." })
      3. Query available: journeyss(where: { status: 0 })
      4. Verify fields: id, sender, receiver, driver, status, bounty, orderId
      5. Handle empty results gracefully

      Run: cd indexer && npm test -- --grep 'journeys-query'
    completed: false
    parallel_group: 7
  # ===========================================================================
  # GROUP 8: E2E Tests
  # Full pipeline tests - depends on everything wired up
  # ===========================================================================
  - title: 'T-024: Write E2E test - Order creation appears in indexer'
    description: |
      Create file: e2e/tests/order-indexing.test.ts

      Test flow:
      1. Create order via contract call or service
      2. Wait for indexer to sync (poll with timeout, max 30s)
      3. Query orderss(where: { id: $orderId })
      4. Verify order data matches: buyer, seller, token, price, status='OPEN'

      Use existing e2e test patterns in the codebase.

      Run: npm run test:e2e -- order-indexing
    completed: false
    parallel_group: 8
  - title: 'T-025: Write E2E test - Journey status updates in indexer'
    description: |
      Create file: e2e/tests/journey-indexing.test.ts

      Test flow:
      1. Create journey via contract
      2. Verify initial status=0 in indexer
      3. Update journey status (driver accepts)
      4. Verify status=1 in indexer

      Run: npm run test:e2e -- journey-indexing
    completed: false
    parallel_group: 8
  - title: 'T-026: Write E2E test - Node registration appears in indexer'
    description: |
      Create file: e2e/tests/node-indexing.test.ts

      Test flow:
      1. Register node via contract
      2. Wait for indexer sync
      3. Query nodess(where: { owner: $address })
      4. Verify node data: owner, validNode=true, status='Active'

      Run: npm run test:e2e -- node-indexing
    completed: false
    parallel_group: 8
  - title: 'T-027: Write E2E test - CLOB order lifecycle'
    description: |
      Create file: e2e/tests/clob-order-indexing.test.ts

      Test flow:
      1. Place limit order via CLOBService
      2. Verify status='OPEN' in indexer
      3. Cancel order via CLOBService
      4. Verify status='CANCELLED' in indexer

      Run: npm run test:e2e -- clob-order-indexing
    completed: false
    parallel_group: 8
  # ===========================================================================
  # GROUP 9: Type & Contract Tests
  # Compile-time and boundary tests - depends on types stable
  # ===========================================================================
  - title: 'T-028: Create boundary contract tests'
    description: |
      Create file: test/contracts/indexer-frontend-contract.test.ts

      Test that frontend queries match indexer schema:

      1. Parse GET_ALL_ASSETS query, extract field names
      2. Verify each field exists in AssetGraphQLItem type
      3. Repeat for GET_ORDERS_BY_BUYER -> OrderGraphQLItem
      4. Repeat for GET_JOURNEYS_BY_SENDER -> JourneyGraphQLItem
      5. Repeat for GET_NODES_BY_OWNER -> NodeGraphQLItem

      These tests ensure the contract between indexer and frontend is maintained.
      If someone adds a field to a query, they must add it to the type.

      Run: npm run test:vitest -- indexer-frontend-contract
    completed: false
    parallel_group: 9
  - title: 'T-029: Create repository type conformance tests'
    description: |
      Create file: test/types/repository-types.test-d.ts

      Use vitest's expectTypeOf for compile-time type tests:

      import { expectTypeOf } from 'vitest';
      import { OrdersRepository } from '../../infrastructure/repositories/orders-repository';
      import { IOrderRepository } from '../../domain/orders/order';

      test('OrdersRepository implements IOrderRepository', () => {
        expectTypeOf<OrdersRepository>().toMatchTypeOf<IOrderRepository>();
      });

      Repeat for NodeRepository, DriverRepository, etc.

      Run: npm run test:vitest -- repository-types
    completed: false
    parallel_group: 9
  # ===========================================================================
  # GROUP 10: Final Validation
  # Full test suite and documentation - depends on all tests
  # ===========================================================================
  - title: 'T-030: Regenerate and run full test suite'
    description: |
      Final validation steps:

      1. Run: npm run generate:indexer
      2. Run: cd indexer && npx tsc --noEmit (must pass)
      3. Run: npm run typecheck (must pass)
      4. Run: npm run test:vitest (unit tests must pass)
      5. Run: cd indexer && npm test -- --grep smoke (smoke tests must pass)

      Document any failures in progress.txt with:
      - Test name
      - Error message
      - Root cause analysis

      All tests should pass for this task to be complete.
    completed: false
    parallel_group: 10
  - title: 'T-031: Run E2E tests against local environment'
    description: |
      Full E2E validation:

      1. Start local Hardhat node: npx hardhat node
      2. Deploy contracts if needed
      3. Start local indexer: cd indexer && npm run dev
      4. Wait for indexer to sync
      5. Run: npm run test:e2e

      All E2E tests should pass.
      Document results in progress.txt.
    completed: false
    parallel_group: 10
  - title: 'T-032: Document type boundaries in AGENTS.md'
    description: |
      Update AGENTS.md with new section:

      ## Type-Safe Data Pipeline

      Document the data flow:
      1. Blockchain Events -> Ponder Handlers -> Aggregate Tables (snake_case)
      2. Aggregate Tables -> GraphQL API (camelCase auto-conversion)
      3. GraphQL API -> indexer-types.ts (typed responses)
      4. Mappers -> Domain Types (business logic types)
      5. Domain Types -> UI Components

      Document key files:
      - indexer/src/types/schema.ts - Ponder schema types
      - infrastructure/shared/indexer-types.ts - GraphQL response types
      - infrastructure/shared/mappers.ts - Type-safe mappers
      - domain/ - Business domain types

      Include example of adding a new aggregate table end-to-end.
    completed: false
    parallel_group: 10
