specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: AuStake
    network: base-sepolia
    source:
      address: "0x5d407517fdE0AEA3AC1A89b7B0f4b8Dd3cD54F3f"
      abi: AuStake
      startBlock: 30654783
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AdminStatusChanged
        - OperationCreated
        - OwnershipTransferred
        - RewardPaid
        - Staked
        - Unstaked
      abis:
        - name: AuStake
          file: AuStake/AuStake.json
      eventHandlers:
        - event: AdminStatusChanged(indexed address,bool)
          handler: handleAdminStatusChanged
        - event: OperationCreated(indexed bytes32,string,address)
          handler: handleOperationCreated
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: RewardPaid(indexed address,uint256,indexed bytes32)
          handler: handleRewardPaid
        - event: Staked(indexed address,indexed address,uint256,indexed bytes32,string,uint256)
          handler: handleStaked
        - event: Unstaked(indexed address,indexed address,uint256,indexed bytes32,string,uint256)
          handler: handleUnstaked
      file: AuStake/AuStake.wasm
